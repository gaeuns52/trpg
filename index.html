<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRPG</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f0f0f0; }
        .hidden { display: none !important; }

        /* 로비 */
        #lobby { max-width: 400px; margin: 30px auto; padding: 25px; background: #fff; border-radius: 25px; border: 1px solid #ddd; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        #lobby h2 { margin-bottom: 16px; }
        .lobby-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
        .lobby-tab { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 12px; background: #f9f9f9; cursor: pointer; font-size: 14px; font-weight: bold; color: #555; text-align: center; }
        .lobby-tab.active { background: #000; color: #fff; border-color: #000; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .field-label { font-size: 12px; color: #888; margin-bottom: 4px; }
        input[type=text], input[type=number], input[type=password], textarea {
            width: 100%; padding: 12px; margin: 0 0 14px 0; border: 1px solid #ddd;
            border-radius: 12px; box-sizing: border-box; background: #f9f9f9; font-size: 14px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        textarea { resize: none; height: 80px; margin: 0 0 14px 0; }
        .btn-create { width: 100%; padding: 14px; background: #000; color: #fff; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 15px; }
        .btn-secondary { width: 100%; padding: 12px; background: #f0f0f0; color: #333; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 14px; margin-top: 8px; }

        /* 프로필 아바타 미리보기 */
        .avatar-preview { width: 70px; height: 70px; border-radius: 50%; object-fit: cover; border: 2px solid #ddd; display: block; margin: 0 auto 12px; background: #eee; }

        /* 게임룸 */
        #game-room { display: flex; flex-direction: column; height: 100vh; max-width: 600px; margin: 0 auto; background: white; position: relative; }
        .header { display: flex; justify-content: space-between; padding: 15px 20px; border-bottom: 1px solid #eee; align-items: center; }

        /* 채팅 */
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 4px; }

        /* 말풍선 그룹 */
        .msg-group { display: flex; flex-direction: column; margin-bottom: 8px; }
        .msg-group-my { align-items: flex-end; }
        .msg-group-other { align-items: flex-start; }

        /* 발신자 헤더 (아바타+이름) */
        .msg-header { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
        .msg-group-my .msg-header { flex-direction: row-reverse; }
        .msg-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; background: #ddd; flex-shrink: 0; }
        .msg-sender-name { font-size: 12px; color: #888; }

        /* 버블 행 (버블 + 시간) */
        .bubble-row { display: flex; align-items: flex-end; gap: 6px; margin-bottom: 2px; }
        .msg-group-my .bubble-row { flex-direction: row-reverse; }
        .msg-time { font-size: 11px; color: #bbb; white-space: nowrap; flex-shrink: 0; }

        .chat-bubble {
            padding: 10px 14px; font-size: 15px; border-radius: 18px; line-height: 1.5;
            word-break: break-word; white-space: pre-wrap;
            max-width: 280px; min-width: 0;
            overflow-y: auto; max-height: 200px;
        }
        .msg-group-my .chat-bubble { background: #000; color: #fff; border-bottom-right-radius: 4px; }
        .msg-group-other .chat-bubble { background: #e9e9eb; color: #000; border-bottom-left-radius: 4px; }

        /* 시스템 메시지 */
        .msg-system { text-align: center; color: #aaa; font-size: 12px; margin: 8px 0; }
        .msg-system-bold { text-align: center; color: #333; font-weight: bold; font-size: 13px; margin: 8px 0; }
        .msg-system-img { text-align: center; margin: 8px 0; }
        .msg-system-img img { max-width: 90%; border-radius: 10px; cursor: pointer; }

        /* 메뉴 패널 */
        #menu-panel { position: absolute; top: 65px; right: 10px; width: 260px; background: #fff; border-radius: 20px; padding: 20px; z-index: 10; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 1px solid #eee; max-height: 80vh; overflow-y: auto; }
        #admin-help { display:none; font-size:12px; border-bottom:1px solid #eee; margin-bottom:10px; padding-bottom:8px; line-height: 1.8; }
        .menu-section-title { font-size: 12px; color: #888; font-weight: bold; margin-bottom: 8px; letter-spacing: 0.5px; }
        .menu-char-card { background: #f9f9f9; border: 1px solid #ddd; border-radius: 12px; padding: 10px; margin-bottom: 8px; cursor: pointer; transition: border-color .15s; display: flex; align-items: center; gap: 10px; }
        .menu-char-card:hover { border-color: #000; }
        .menu-char-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; background: #ddd; flex-shrink: 0; }
        .menu-char-info { flex: 1; min-width: 0; }
        .menu-char-name { font-weight: bold; font-size: 13px; }
        .menu-char-stats { font-size: 11px; color: #666; margin-top: 2px; }
        .badge-admin { background: #000; color: #fff; padding: 1px 6px; border-radius: 5px; font-size: 10px; margin-left: 4px; }

        /* GM 이미지 공유 */
        #gm-img-panel { padding: 10px 20px; border-bottom: 1px solid #eee; background: #fafafa; display: none; }
        .gm-img-row { display: flex; gap: 8px; }
        .gm-img-row input { flex: 1; margin: 0; height: 38px; padding: 0 12px; border-radius: 10px; }
        .gm-img-btn { padding: 0 14px; height: 38px; background: #000; color: #fff; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 13px; white-space: nowrap; }

        /* 입력창 */
        #send-btn { width: 60px; height: 44px; background: #000; color: #fff; border: none; border-radius: 22px; cursor: pointer; font-weight: bold; }

        /* 조사 종료 결과 팝업 */
        .result-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: center; justify-content: center; }
        .result-box { background: #fff; border-radius: 20px; padding: 28px; max-width: 380px; width: 90%; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .result-title { font-size: 18px; font-weight: bold; margin-bottom: 16px; text-align: center; }
        .result-section { margin-bottom: 14px; }
        .result-section-label { font-size: 11px; color: #888; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
        .result-item { background: #f5f5f5; border-radius: 10px; padding: 8px 12px; margin-bottom: 6px; font-size: 14px; }
        .result-char-row { display: flex; justify-content: space-between; align-items: center; background: #f5f5f5; border-radius: 10px; padding: 8px 12px; margin-bottom: 6px; }
        .result-char-name { font-weight: bold; font-size: 14px; }
        .result-char-stats { font-size: 12px; color: #555; }
        .result-close-btn { width: 100%; padding: 12px; background: #000; color: #fff; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 8px; font-size: 15px; }

        /* 캐릭터 상세 팝업 */
        .char-detail-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: center; justify-content: center; }
        .char-detail-box { background: #fff; border-radius: 20px; padding: 28px; max-width: 320px; width: 90%; box-shadow: 0 20px 60px rgba(0,0,0,0.2); text-align: center; }
        .char-detail-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; border: 2px solid #ddd; margin: 0 auto 12px; display: block; background: #eee; }
        .char-detail-name { font-size: 20px; font-weight: bold; margin-bottom: 4px; }
        .char-detail-bio { font-size: 13px; color: #666; margin-bottom: 14px; line-height: 1.5; }
        .char-stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
        .char-stat-box { background: #f5f5f5; border-radius: 12px; padding: 12px; }
        .char-stat-label { font-size: 11px; color: #888; margin-bottom: 4px; }
        .char-stat-val { font-size: 22px; font-weight: bold; }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }
    </style>
</head>
<body>

<!-- ══ 로비 ══ -->
<div id="lobby">
    <h2>🎲 TRPG</h2>
    <div class="lobby-tabs">
        <div class="lobby-tab active" onclick="switchTab('tab-room')">방 입장</div>
        <div class="lobby-tab" onclick="switchTab('tab-profile')">프로필 설정</div>
    </div>

    <!-- 방 입장 탭 -->
    <div id="tab-room" class="tab-content active">
        <div class="field-label">닉네임</div>
        <input type="text" id="user-name" placeholder="닉네임">
        <div class="field-label">체력</div>
        <input type="number" id="init-hp" value="10">
        <div class="field-label">정신력</div>
        <input type="number" id="init-san" value="10">
        <div class="field-label">방 제목</div>
        <input type="text" id="new-room-title" placeholder="새 방 제목">
        <div class="field-label">비밀번호</div>
        <input type="password" id="new-room-pass" placeholder="없으면 공개방">
        <button class="btn-create" onclick="createRoom()">방 생성</button>
        <div id="room-list-container" style="margin-top:16px;"></div>
    </div>

    <!-- 프로필 설정 탭 -->
    <div id="tab-profile" class="tab-content">
        <img id="lobby-avatar-preview" class="avatar-preview" src="" onerror="this.src=''">
        <div class="field-label">프로필 사진 URL</div>
        <input type="text" id="profile-avatar-url" placeholder="이미지 URL (Discord, imgur 등)" oninput="updateAvatarPreview()">
        <div style="font-size:11px; color:#aaa; margin-top:-10px; margin-bottom:14px;">💡 Discord에서 이미지 우클릭 → 링크 복사</div>
        <div class="field-label">캐릭터 소개</div>
        <textarea id="profile-bio-input" placeholder="캐릭터 소개를 입력하세요..."></textarea>
        <button class="btn-create" onclick="saveProfileLocally()">프로필 저장</button>
        <div id="profile-save-msg" style="text-align:center; color:green; font-size:13px; margin-top:8px; display:none;">✅ 저장되었습니다!</div>
    </div>
</div>

<!-- ══ 게임룸 ══ -->
<div id="game-room" class="hidden">
    <div class="header">
        <strong>현재 위치: <span id="map-box">로비</span></strong>
        <div onclick="toggleMenu()" style="cursor:pointer; font-size:20px;">☰</div>
    </div>

    <!-- 메뉴 패널 -->
    <div id="menu-panel" class="hidden">
        <div id="admin-help">
            <b>[기본 명령어]</b><br>
            /강퇴 [이름]<br>/아이템 [이름] 획득<br>/[n층]<br>
            /[이름] 체력/정신력 [수치]<br>/[이름] 룰렛<br>/조사 종료<br><br>
            <b>[구글 시트 명령어]</b><br><span id="sheet-cmds"></span>
        </div>
        <div class="menu-section-title">👥 참여자 <span style="font-weight:normal;font-size:11px;color:#aaa;">(클릭하면 프로필 확인)</span></div>
        <div id="character-container"></div>
        <div style="margin-top:12px;" class="menu-section-title">📦 아이템</div>
        <div id="item-list" style="font-size:13px; color:#555; margin-bottom:12px;">없음</div>
        <hr style="border:none;border-top:1px solid #eee; margin-bottom:12px;">
        <button class="btn-secondary" onclick="leaveRoom()">방 나가기</button>
    </div>

    <!-- GM 이미지 공유 패널 -->
    <div id="gm-img-panel">
        <div style="font-size:11px; color:#888; margin-bottom:6px;">🗺️ GM 이미지/지도 공유</div>
        <div class="gm-img-row">
            <input type="text" id="gm-img-url" placeholder="이미지 URL 붙여넣기">
            <button class="gm-img-btn" onclick="shareGmImage()">공유</button>
        </div>
    </div>

    <div id="chat-box"></div>

    <div style="display:flex; padding:10px; border-top:1px solid #eee; gap:8px;">
        <input type="text" id="chat-input" onkeypress="if(event.keyCode==13) sendChat()" style="flex:1; height:44px; padding:0 15px; border:1px solid #ddd; border-radius:22px; box-sizing:border-box; font-size:14px;">
        <button id="send-btn" onclick="sendChat()">전송</button>
    </div>
</div>

<!-- ══ 조사 종료 결과 팝업 ══ -->
<div id="result-overlay" class="result-overlay hidden">
    <div class="result-box">
        <div class="result-title">📋 조사 결과</div>
        <div class="result-section">
            <div class="result-section-label">🗺️ 이동한 장소</div>
            <div id="result-locations"></div>
        </div>
        <div class="result-section">
            <div class="result-section-label">📦 획득 아이템</div>
            <div id="result-items"></div>
        </div>
        <div class="result-section">
            <div class="result-section-label">👥 최종 캐릭터 상태</div>
            <div id="result-chars"></div>
        </div>
        <button class="result-close-btn" onclick="closeResult()">확인</button>
    </div>
</div>

<!-- ══ 캐릭터 상세 팝업 ══ -->
<div id="char-detail-overlay" class="char-detail-overlay hidden">
    <div class="char-detail-box">
        <img id="cd-avatar" class="char-detail-avatar" src="" onerror="this.src=''">
        <div class="char-detail-name" id="cd-name"></div>
        <div class="char-detail-bio" id="cd-bio"></div>
        <div class="char-stat-grid" id="cd-stats"></div>
        <button class="result-close-btn" onclick="closeCharDetail()">닫기</button>
    </div>
</div>

<script>
const socket = io();
let myNick = "";
let isAdmin = false;
let amSpectator = false;
let allCharacters = {};
let roomCreatorName = "";
let lastSender = null; // 연속 메시지 추적
let visitedLocations = []; // 조사 중 이동 장소 기록
let sessionItems = []; // 조사 중 획득 아이템

// ── 탭 전환 ──
function switchTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.lobby-tab').forEach(t => t.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    event.target.classList.add('active');
}

// ── 프로필 로컬 저장 ──
function updateAvatarPreview() {
    const url = document.getElementById('profile-avatar-url').value;
    document.getElementById('lobby-avatar-preview').src = url;
}

function saveProfileLocally() {
    const avatar = document.getElementById('profile-avatar-url').value.trim();
    const bio = document.getElementById('profile-bio-input').value.trim();
    localStorage.setItem('myAvatar', avatar);
    localStorage.setItem('myBio', bio);
    const msg = document.getElementById('profile-save-msg');
    msg.style.display = 'block';
    setTimeout(() => msg.style.display = 'none', 2000);
}

function loadProfileLocally() {
    const avatar = localStorage.getItem('myAvatar') || '';
    const bio = localStorage.getItem('myBio') || '';
    document.getElementById('profile-avatar-url').value = avatar;
    document.getElementById('profile-bio-input').value = bio;
    document.getElementById('lobby-avatar-preview').src = avatar;
}

// ── 메뉴 토글 ──
function toggleMenu() {
    document.getElementById('menu-panel').classList.toggle('hidden');
}

// ── 방 나가기 ──
function leaveRoom() {
    localStorage.removeItem('roomTitle');
    localStorage.removeItem('nick');
    localStorage.removeItem('isSpectator');
    location.reload();
}

// ── 방 생성 / 입장 ──
function createRoom() {
    myNick = document.getElementById('user-name').value.trim();
    const title = document.getElementById('new-room-title').value.trim();
    const pass = document.getElementById('new-room-pass').value;
    if (!myNick || !title) return alert("닉네임과 방 제목을 입력하세요!");
    socket.emit('create_room', { title, password: pass, creatorName: myNick });
    socket.once('create_success', (t) => joinRoom(t, pass));
}

function joinRoom(title, pass) {
    myNick = document.getElementById('user-name').value.trim();
    if (!myNick) return alert("닉네임을 먼저 입력하세요!");
    const avatar = localStorage.getItem('myAvatar') || '';
    const bio = localStorage.getItem('myBio') || '';
    socket.emit('join_room', {
        title, password: pass, name: myNick,
        hp: document.getElementById('init-hp').value,
        san: document.getElementById('init-san').value,
        avatar, bio
    });
}

function handleJoinClick(title, hasPassword) {
    myNick = document.getElementById('user-name').value.trim();
    if (!myNick) return alert("닉네임을 먼저 입력하세요!");
    if (hasPassword) {
        const pass = prompt("비밀번호를 입력하세요:\n(빈칸으로 확인하면 관전자로 입장)");
        if (pass !== null) joinRoom(title, pass);
    } else {
        joinRoom(title, "");
    }
}

// ── 채팅 전송 ──
function sendChat() {
    const input = document.getElementById('chat-input');
    const val = input.value.trim();
    if (!val) return;
    socket.emit('msg_send', val);
    input.value = '';
}

// ── GM 이미지 공유 ──
function shareGmImage() {
    const url = document.getElementById('gm-img-url').value.trim();
    if (!url) return alert('이미지 URL을 입력하세요.');
    socket.emit('share_image', { imageUrl: url });
    document.getElementById('gm-img-url').value = '';
}

// ── 현재 시간 포맷 ──
function getNow() {
    const d = new Date();
    const h = String(d.getHours()).padStart(2, '0');
    const m = String(d.getMinutes()).padStart(2, '0');
    return `${h}:${m}`;
}

// ── 메시지 렌더링 ──
function appendMessage({ sender, text, type }) {
    const box = document.getElementById('chat-box');

    if (type === 'system') {
        lastSender = null; // 시스템 메시지 사이엔 연속 처리 끊기
        const parts = text.split('|');
        if (parts.length > 1) {
            const d = document.createElement('div');
            d.className = 'msg-system-bold';
            d.textContent = parts[0].trim();
            box.appendChild(d);
            const wrap = document.createElement('div');
            wrap.className = 'msg-system-img';
            const img = document.createElement('img');
            img.src = parts[1].trim();
            img.onclick = () => window.open(parts[1].trim());
            wrap.appendChild(img);
            box.appendChild(wrap);
        } else {
            const d = document.createElement('div');
            d.className = 'msg-system';
            d.textContent = text;
            box.appendChild(d);
        }
        box.scrollTop = box.scrollHeight;
        return;
    }

    // 일반 채팅
    const isMy = sender === myNick;
    const char = allCharacters[sender];
    const avatar = char?.avatar || '';
    const time = getNow();
    const isContinuous = lastSender === sender;
    lastSender = sender;

    if (!isContinuous) {
        // 새 그룹 생성
        const group = document.createElement('div');
        group.className = `msg-group ${isMy ? 'msg-group-my' : 'msg-group-other'}`;

        // 헤더 (아바타 + 이름)
        const header = document.createElement('div');
        header.className = 'msg-header';
        const av = document.createElement('img');
        av.className = 'msg-avatar';
        av.src = avatar;
        const nameEl = document.createElement('span');
        nameEl.className = 'msg-sender-name';
        nameEl.textContent = sender;
        header.appendChild(av);
        if (!isMy) header.appendChild(nameEl);
        group.appendChild(header);

        // 버블 행
        const bubbleRow = document.createElement('div');
        bubbleRow.className = 'bubble-row';
        const bubble = document.createElement('div');
        bubble.className = 'chat-bubble';
        bubble.textContent = text;
        const timeEl = document.createElement('span');
        timeEl.className = 'msg-time';
        timeEl.textContent = time;
        bubbleRow.appendChild(bubble);
        bubbleRow.appendChild(timeEl);
        group.appendChild(bubbleRow);
        group.dataset.sender = sender;
        box.appendChild(group);
    } else {
        // 기존 그룹에 버블만 추가
        const groups = box.querySelectorAll('.msg-group');
        const lastGroup = groups[groups.length - 1];
        if (lastGroup && lastGroup.dataset.sender === sender) {
            const bubbleRow = document.createElement('div');
            bubbleRow.className = 'bubble-row';
            const bubble = document.createElement('div');
            bubble.className = 'chat-bubble';
            bubble.textContent = text;
            const timeEl = document.createElement('span');
            timeEl.className = 'msg-time';
            timeEl.textContent = time;
            bubbleRow.appendChild(bubble);
            bubbleRow.appendChild(timeEl);
            lastGroup.appendChild(bubbleRow);
        }
    }

    box.scrollTop = box.scrollHeight;
}

// ── 참여자 카드 클릭 → 상세 팝업 ──
function openCharDetail(name) {
    const char = allCharacters[name];
    if (!char) return;
    const isCreator = name === roomCreatorName;
    document.getElementById('cd-avatar').src = char.avatar || '';
    document.getElementById('cd-name').textContent = name + (isCreator ? ' (방장)' : '');
    document.getElementById('cd-bio').textContent = char.bio || '소개 없음';
    const sg = document.getElementById('cd-stats');
    sg.innerHTML = '';
    if (!isCreator) {
        [{ label:'체력', val: char.hp }, { label:'정신력', val: char.san }].forEach(s => {
            const box = document.createElement('div');
            box.className = 'char-stat-box';
            box.innerHTML = `<div class="char-stat-label">${s.label}</div><div class="char-stat-val">${s.val}</div>`;
            sg.appendChild(box);
        });
    }
    document.getElementById('char-detail-overlay').classList.remove('hidden');
}
function closeCharDetail() { document.getElementById('char-detail-overlay').classList.add('hidden'); }

// ── 조사 결과 팝업 ──
function showResult(data) {
    const { locations, items, characters, creatorName } = data;
    const locEl = document.getElementById('result-locations');
    locEl.innerHTML = locations.length ? locations.map(l => `<div class="result-item">📍 ${l}</div>`).join('') : '<div class="result-item" style="color:#aaa;">이동 없음</div>';
    const itemEl = document.getElementById('result-items');
    itemEl.innerHTML = items.length ? items.map(i => `<div class="result-item">📦 ${i.name}</div>`).join('') : '<div class="result-item" style="color:#aaa;">획득 아이템 없음</div>';
    const charEl = document.getElementById('result-chars');
    charEl.innerHTML = Object.entries(characters).filter(([n]) => n !== creatorName).map(([n, d]) =>
        `<div class="result-char-row"><span class="result-char-name">${n}</span><span class="result-char-stats">체력 ${d.hp} / 정신력 ${d.san}</span></div>`
    ).join('') || '<div class="result-item" style="color:#aaa;">참여자 없음</div>';
    document.getElementById('result-overlay').classList.remove('hidden');
}
function closeResult() { document.getElementById('result-overlay').classList.add('hidden'); }

// ══════════════════ 소켓 이벤트 ══════════════════

socket.on('join_success', (data) => {
    localStorage.setItem('roomTitle', data.title);
    localStorage.setItem('nick', myNick);
    localStorage.setItem('isSpectator', data.isSpectator || false);
    isAdmin = data.isAdmin;
    amSpectator = data.isSpectator || false;
    document.getElementById('lobby').classList.add('hidden');
    document.getElementById('game-room').classList.remove('hidden');
    if (isAdmin) document.getElementById('gm-img-panel').style.display = 'block';
    if (amSpectator) {
        document.getElementById('chat-input').disabled = true;
        document.getElementById('chat-input').placeholder = '관전자는 채팅 불가';
        document.getElementById('send-btn').disabled = true;
    }
    // 입장하면 서버에 프로필 동기화
    const avatar = localStorage.getItem('myAvatar') || '';
    const bio = localStorage.getItem('myBio') || '';
    socket.emit('update_profile', { avatar, bio });
});

socket.on('update_commands', (cmds) => {
    if (!isAdmin) return;
    const sheetHelp = document.getElementById('sheet-cmds');
    sheetHelp.textContent = cmds.map(c => c.cmd).join('\n');
    sheetHelp.style.whiteSpace = 'pre';
    document.getElementById('admin-help').style.display = 'block';
});

socket.on('msg_receive', (data) => {
    appendMessage(data);
});

socket.on('survey_result', (data) => {
    showResult(data);
});

socket.on('update_data', ({ characters, items, mapInfo, creatorName }) => {
    allCharacters = characters;
    roomCreatorName = creatorName;
    document.getElementById('map-box').textContent = mapInfo;

    // 참여자 카드
    const container = document.getElementById('character-container');
    container.innerHTML = '';
    Object.entries(characters).forEach(([name, data]) => {
        const isCreatorCard = name === creatorName;
        const card = document.createElement('div');
        card.className = 'menu-char-card';
        card.onclick = () => openCharDetail(name);

        const av = document.createElement('img');
        av.className = 'menu-char-avatar';
        av.src = data.avatar || '';

        const info = document.createElement('div');
        info.className = 'menu-char-info';
        const nameRow = document.createElement('div');
        nameRow.className = 'menu-char-name';
        nameRow.textContent = name;
        if (isCreatorCard) {
            const b = document.createElement('span');
            b.className = 'badge-admin';
            b.textContent = '방장';
            nameRow.appendChild(b);
        }
        info.appendChild(nameRow);
        if (!isCreatorCard) {
            const stats = document.createElement('div');
            stats.className = 'menu-char-stats';
            stats.textContent = `체력 ${data.hp} / 정신력 ${data.san}`;
            info.appendChild(stats);
        }
        card.appendChild(av);
        card.appendChild(info);
        container.appendChild(card);
    });

    document.getElementById('item-list').textContent = items.map(i => i.name).join(', ') || '없음';
});

socket.on('room_list', (list) => {
    const container = document.getElementById('room-list-container');
    container.innerHTML = '';
    if (!list.length) {
        container.innerHTML = '<div style="text-align:center;color:#aaa;font-size:13px;padding:16px;">생성된 방이 없습니다</div>';
        return;
    }
    list.forEach(r => {
        const div = document.createElement('div');
        div.style.cssText = 'margin-top:10px; padding:12px; border:1px solid #ddd; border-radius:12px; display:flex; justify-content:space-between; align-items:center;';
        const info = document.createElement('div');
        const title = document.createElement('div');
        title.style.fontWeight = 'bold';
        title.textContent = r.title + (r.hasPassword ? ' 🔒' : '');
        const meta = document.createElement('div');
        meta.style.cssText = 'font-size:11px; color:#aaa; margin-top:2px;';
        meta.textContent = `플레이어 ${r.playerCount}명`;
        info.appendChild(title);
        info.appendChild(meta);
        const btn = document.createElement('button');
        btn.style.cssText = 'padding:7px 14px; background:#000; color:#fff; border:none; border-radius:10px; cursor:pointer; font-weight:bold; font-size:13px;';
        btn.textContent = '입장';
        btn.onclick = () => handleJoinClick(r.title, r.hasPassword);
        div.appendChild(info);
        div.appendChild(btn);
        container.appendChild(div);
    });
});

socket.on('system_alert', msg => alert(msg));

socket.on('room_closed', () => {
    localStorage.removeItem('roomTitle');
    localStorage.removeItem('nick');
    localStorage.removeItem('isSpectator');
    alert('방장이 퇴장하여 방이 종료되었습니다.');
    location.reload();
});

socket.on('kick_user', () => {
    localStorage.removeItem('roomTitle');
    localStorage.removeItem('nick');
    localStorage.removeItem('isSpectator');
    alert('강퇴되었습니다.');
    location.reload();
});

// ── 초기화 ──
window.onload = () => {
    loadProfileLocally();

    const roomTitle = localStorage.getItem('roomTitle');
    const nick = localStorage.getItem('nick');
    const spec = localStorage.getItem('isSpectator') === 'true';

    if (roomTitle && nick) {
        myNick = nick;
        document.getElementById('user-name').value = nick;
        const avatar = localStorage.getItem('myAvatar') || '';
        const bio = localStorage.getItem('myBio') || '';
        socket.emit('rejoin_room', { title: roomTitle, name: nick, isSpectator: spec, avatar, bio });
    }
};

setInterval(() => socket.emit('get_room_list'), 2000);
</script>
</body>
</html>
